<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Space Colonizer V7.2</title>
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">

<style>
html,body{
  margin:0;
  overflow:hidden;
  background:#000;
  font-family:Arial;
  touch-action:none;
}

canvas{
  position:fixed;
  inset:0;
}

#ui{
  position:fixed;
  top:10px;
  left:10px;
  right:10px;
  display:flex;
  flex-wrap:wrap;
  gap:6px;
  z-index:20;
  color:white;
}

button{
  padding:10px;
  border:none;
  border-radius:8px;
  background:#222;
  color:white;
  font-size:12px;
}

#joyMoveBase,#joyAimBase{
  position:fixed;
  bottom:35px;
  width:130px;
  height:130px;
  border-radius:50%;
  background:rgba(255,255,255,0.08);
  z-index:20;
}

#joyMoveBase{
  left:25px;
}

#joyAimBase{
  right:25px;
  background:rgba(255,0,0,0.08);
}

.stick{
  position:absolute;
  width:55px;
  height:55px;
  border-radius:50%;
  background:rgba(255,255,255,0.4);
  left:37px;
  top:37px;
}

#map{
  position:fixed;
  top:10px;
  right:10px;
  width:170px;
  height:170px;
  background:rgba(0,0,0,0.7);
  border:1px solid rgba(0,255,120,0.3);
  z-index:5;
  pointer-events:none;
}
</style>
</head>
<body>

<canvas id="c"></canvas>
<canvas id="map"></canvas>

<div id="ui">
  <button onclick="buildExtractor()">Extractor (15)</button>
  <button onclick="buildDrone()">Drone (25)</button>
  <button onclick="toggleBoost()">Boost</button>
  <button onclick="toggleLanding()" id="landBtn">Land</button>
  <button onclick="toggleFullscreen()">Fullscreen</button>

  <div style="margin-left:auto;">
    Resources: <span id="res">0</span>
  </div>
</div>

<div id="joyMoveBase">
  <div class="stick" id="moveStick"></div>
</div>

<div id="joyAimBase">
  <div class="stick" id="aimStick"></div>
</div>

<script>

const canvas=document.getElementById("c");
const ctx=canvas.getContext("2d");

const map=document.getElementById("map");
const mctx=map.getContext("2d");

function resize(){

  canvas.width=innerWidth;
  canvas.height=innerHeight;
}
resize();

addEventListener("resize",resize);

map.width=170;
map.height=170;

/* =========================
SHIP IMAGE
========================= */

const shipImg=new Image();

shipImg.src=
"https://raw.githubusercontent.com/Devmanmike/Space-game-1/refs/heads/main/Polish_20260516_231834569.png";

let playerAngle=0;

/* =========================
WORLD
========================= */

const player={
  x:0,
  y:0
};

let resources=120;

let boost=false;

let landed=false;
let landedPlanet=null;

/* =========================
SPACE OBJECTS
========================= */

const planets=[
  {
    x:1200,
    y:500,
    r:180,
    color:"#2d79ff",
    name:"Terra"
  },
  {
    x:-1500,
    y:-900,
    r:220,
    color:"#88ddff",
    name:"Ice"
  },
  {
    x:2200,
    y:-1700,
    r:160,
    color:"#d69d45",
    name:"Desert"
  }
];

const blackholes=[];

for(let i=0;i<2;i++){

  blackholes.push({

    x:(Math.random()-0.5)*7000,
    y:(Math.random()-0.5)*7000,
    r:100+Math.random()*50
  });
}

/* =========================
SURFACE
========================= */

let surfaceRocks=[];

function generateSurface(){

  surfaceRocks=[];

  for(let i=0;i<40;i++){

    surfaceRocks.push({

      x:(Math.random()-0.5)*2400,
      y:(Math.random()-0.5)*2400,

      r:18+Math.random()*25,

      hp:60,
      maxHp:60,

      splitLevel:0
    });
  }
}

/* =========================
CHUNKS
========================= */

const chunkSize=1000;

const chunks=new Map();

function chunkKey(x,y){

  return x+","+y;
}

function generateChunk(cx,cy){

  const key=chunkKey(cx,cy);

  if(chunks.has(key))
    return chunks.get(key);

  const asteroids=[];

  for(let i=0;i<8;i++){

    asteroids.push({

      x:cx*chunkSize+Math.random()*chunkSize,
      y:cy*chunkSize+Math.random()*chunkSize,

      r:18+Math.random()*50,

      hp:100,
      maxHp:100,

      vx:(Math.random()-0.5)*0.3,
      vy:(Math.random()-0.5)*0.3,

      splitLevel:0
    });
  }

  chunks.set(key,asteroids);

  return asteroids;
}

function getAsteroids(){

  const cx=Math.floor(player.x/chunkSize);
  const cy=Math.floor(player.y/chunkSize);

  let result=[];

  for(let yy=-1;yy<=1;yy++){
    for(let xx=-1;xx<=1;xx++){

      result.push(
        ...generateChunk(cx+xx,cy+yy)
      );
    }
  }

  return result;
}

/* =========================
BUILDINGS / DRONES
========================= */

const buildings=[];
const drones=[];

function buildExtractor(){

  if(resources<15) return;

  resources-=15;

  buildings.push({

    type:"extractor",

    x:player.x,
    y:player.y
  });
}

function buildDrone(){

  if(resources<25) return;

  resources-=25;

  drones.push({

    x:player.x,
    y:player.y
  });
}

/* =========================
INPUT
========================= */

let move={
  active:false,
  x:0,
  y:0
};

let aim={
  active:false,
  holding:false,
  x:0,
  y:0
};

const mBase=document.getElementById("joyMoveBase");
const aBase=document.getElementById("joyAimBase");

const mStick=document.getElementById("moveStick");
const aStick=document.getElementById("aimStick");

/* MOVE */

function joyMove(e){

  if(!move.active) return;

  const r=mBase.getBoundingClientRect();

  const cx=r.left+65;
  const cy=r.top+65;

  const px=e.touches
    ?e.touches[0].clientX
    :e.clientX;

  const py=e.touches
    ?e.touches[0].clientY
    :e.clientY;

  let x=px-cx;
  let y=py-cy;

  let len=Math.hypot(x,y);

  if(len>45){

    x=x/len*45;
    y=y/len*45;
  }

  move.x=x/45;
  move.y=y/45;

  mStick.style.transform=
    `translate(${x}px,${y}px)`;
}

function resetMove(){

  move.active=false;

  move.x=0;
  move.y=0;

  mStick.style.transform=
    "translate(0,0)";
}

/* AIM */

function joyAim(e){

  if(!aim.active) return;

  const r=aBase.getBoundingClientRect();

  const cx=r.left+65;
  const cy=r.top+65;

  const px=e.touches
    ?e.touches[0].clientX
    :e.clientX;

  const py=e.touches
    ?e.touches[0].clientY
    :e.clientY;

  let x=px-cx;
  let y=py-cy;

  let len=Math.hypot(x,y);

  if(len>45){

    x=x/len*45;
    y=y/len*45;
  }

  aim.x=x/45;
  aim.y=y/45;

  aStick.style.transform=
    `translate(${x}px,${y}px)`;
}

function resetAim(){

  aim.active=false;

  aim.holding=false;

  aim.x=0;
  aim.y=0;

  aStick.style.transform=
    "translate(0,0)";
}

mBase.addEventListener("touchstart",()=>{

  move.active=true;
});

mBase.addEventListener("mousedown",()=>{

  move.active=true;
});

mBase.addEventListener("touchmove",joyMove);
mBase.addEventListener("mousemove",joyMove);

mBase.addEventListener("touchend",resetMove);
mBase.addEventListener("mouseup",resetMove);

aBase.addEventListener("touchstart",()=>{

  aim.active=true;
  aim.holding=true;
});

aBase.addEventListener("mousedown",()=>{

  aim.active=true;
  aim.holding=true;
});

aBase.addEventListener("touchmove",joyAim);
aBase.addEventListener("mousemove",joyAim);

aBase.addEventListener("touchend",resetAim);
aBase.addEventListener("mouseup",resetAim);

/* =========================
HELPERS
========================= */

function screen(x,y){

  return{

    x:(x-player.x)+canvas.width/2,
    y:(y-player.y)+canvas.height/2
  };
}

function distLine(px,py,x1,y1,x2,y2){

  let A=px-x1;
  let B=py-y1;
  let C=x2-x1;
  let D=y2-y1;

  let dot=A*C+B*D;

  let len=C*C+D*D;

  let t=Math.max(
    0,
    Math.min(1,dot/len)
  );

  let xx=x1+t*C;
  let yy=y1+t*D;

  return Math.hypot(px-xx,py-yy);
}

/* =========================
ASTEROID REMOVAL
========================= */

function removeAsteroidFromChunks(target){

  for(const [key,list] of chunks){

    const idx=list.indexOf(target);

    if(idx!==-1){

      list.splice(idx,1);
      return;
    }
  }
}

/* =========================
FRAGMENTATION
========================= */

function fragmentAsteroid(a,collection=null){

  if(collection){

    const splitLevel=a.splitLevel||0;

    if(a.r<14 || splitLevel>=2){

      const idx=collection.indexOf(a);

      if(idx!==-1){

        collection.splice(idx,1);
      }

      return;
    }

    const pieces=
      2+Math.floor(Math.random()*2);

    for(let i=0;i<pieces;i++){

      collection.push({

        x:a.x+(Math.random()-0.5)*30,
        y:a.y+(Math.random()-0.5)*30,

        r:a.r*(0.45+Math.random()*0.12),

        hp:a.maxHp*0.45,
        maxHp:a.maxHp*0.45,

        vx:(Math.random()-0.5)*2.5,
        vy:(Math.random()-0.5)*2.5,

        splitLevel:splitLevel+1
      });
    }

    const idx=collection.indexOf(a);

    if(idx!==-1){

      collection.splice(idx,1);
    }

    return;
  }

  const splitLevel=a.splitLevel||0;

  if(a.r<14 || splitLevel>=2){

    removeAsteroidFromChunks(a);
    return;
  }

  let parentChunk=null;

  for(const [key,list] of chunks){

    if(list.includes(a)){

      parentChunk=list;
      break;
    }
  }

  if(!parentChunk){

    removeAsteroidFromChunks(a);
    return;
  }

  const pieces=
    2+Math.floor(Math.random()*2);

  for(let i=0;i<pieces;i++){

    parentChunk.push({

      x:a.x+(Math.random()-0.5)*30,
      y:a.y+(Math.random()-0.5)*30,

      r:a.r*(0.45+Math.random()*0.12),

      hp:a.maxHp*0.45,
      maxHp:a.maxHp*0.45,

      vx:(Math.random()-0.5)*2.5,
      vy:(Math.random()-0.5)*2.5,

      splitLevel:splitLevel+1
    });
  }

  removeAsteroidFromChunks(a);
}

/* =========================
LANDING
========================= */

function nearbyPlanet(){

  for(let p of planets){

    const d=Math.hypot(
      p.x-player.x,
      p.y-player.y
    );

    if(d<p.r+80)
      return p;
  }

  return null;
}

function toggleLanding(){

  if(!landed){

    const p=nearbyPlanet();

    if(!p) return;

    landed=true;

    landedPlanet=p;

    generateSurface();

    player.x=0;
    player.y=0;

    document.getElementById("landBtn")
      .innerText="Takeoff";
  }
  else{

    landed=false;

    landedPlanet=null;

    document.getElementById("landBtn")
      .innerText="Land";
  }
}

/* =========================
LASER
========================= */

function drawLaser(){

  if(!aim.holding) return;

  const sx=canvas.width/2;
  const sy=canvas.height/2;

  const dx=aim.x||0;
  const dy=aim.y||-1;

  const maxLen=2000;

  let hitDist=maxLen;

  let targets=landed
    ?surfaceRocks
    :getAsteroids();

  let hit=null;

  for(let a of targets){

    const s=landed
      ?{
          x:(a.x-player.x)+canvas.width/2,
          y:(a.y-player.y)+canvas.height/2
        }
      :screen(a.x,a.y);

    const d=distLine(

      s.x,s.y,

      sx,sy,

      sx+dx*maxLen,
      sy+dy*maxLen
    );

    if(d<a.r){

      const dd=Math.hypot(
        s.x-sx,
        s.y-sy
      );

      if(dd<hitDist){

        hitDist=dd;
        hit=a;
      }
    }
  }

  if(hit){

    hit.hp-=2.2;

    if(hit.hp<=0){

      resources+=landed?8:5;

      if(landed){
        fragmentAsteroid(hit,surfaceRocks);
      }
      else{
        fragmentAsteroid(hit);
      }
    }
  }

  ctx.strokeStyle=
    landed?"lime":"red";

  ctx.lineWidth=3;

  ctx.beginPath();

  ctx.moveTo(sx,sy);

  ctx.lineTo(
    sx+dx*hitDist,
    sy+dy*hitDist
  );

  ctx.stroke();
}

/* =========================
DRONES
========================= */

function updateDrones(){

  let targets=landed
    ?surfaceRocks
    :getAsteroids();

  for(let d of drones){

    let target=null;
    let best=Infinity;

    for(let a of targets){

      const dist=Math.hypot(
        a.x-d.x,
        a.y-d.y
      );

      if(dist<best){

        best=dist;
        target=a;
      }
    }

    if(!target) continue;

    const dx=target.x-d.x;
    const dy=target.y-d.y;

    const len=Math.hypot(dx,dy);

    const fireRange=220;

    if(len>fireRange){

      d.x+=dx/len*2.5;
      d.y+=dy/len*2.5;
    }

    if(len<=fireRange){

      target.hp-=0.35;

      resources+=0.02;

      const ds=screen(d.x,d.y);
      const ts=screen(target.x,target.y);

      ctx.strokeStyle="orange";
      ctx.lineWidth=2;

      ctx.beginPath();

      ctx.moveTo(ds.x,ds.y);
      ctx.lineTo(ts.x,ts.y);

      ctx.stroke();

      if(target.hp<=0){

        resources+=4;

        if(landed){
          fragmentAsteroid(target,surfaceRocks);
        }
        else{
          fragmentAsteroid(target);
        }
      }
    }
  }
}

/* =========================
BLACK HOLES
========================= */

function updateBlackholes(){

  if(landed) return;

  for(let b of blackholes){

    const dx=b.x-player.x;
    const dy=b.y-player.y;

    const d=Math.hypot(dx,dy);

    if(d<b.r*4){

      player.x+=dx*0.0012;
      player.y+=dy*0.0012;
    }
  }
}

/* =========================
RADAR
========================= */

function drawRadar(){

  mctx.clearRect(
    0,0,
    map.width,map.height
  );

  const cx=map.width/2;
  const cy=map.height/2;

  const scale=0.04;

  mctx.strokeStyle=
    "rgba(0,255,120,0.2)";

  for(let i=1;i<=3;i++){

    mctx.beginPath();

    mctx.arc(
      cx,
      cy,
      i*22,
      0,
      Math.PI*2
    );

    mctx.stroke();
  }

  let radarObjects=[];

  if(landed){
    radarObjects=surfaceRocks;
  }
  else{
    radarObjects=getAsteroids();
  }

  for(let a of radarObjects){

    const rx=(a.x-player.x)*scale;
    const ry=(a.y-player.y)*scale;

    if(Math.hypot(rx,ry)<80){

      mctx.fillStyle="gray";

      mctx.fillRect(
        cx+rx,
        cy+ry,
        2,
        2
      );
    }
  }

  for(let d of drones){

    const rx=(d.x-player.x)*scale;
    const ry=(d.y-player.y)*scale;

    mctx.fillStyle="orange";

    mctx.fillRect(
      cx+rx,
      cy+ry,
      2,
      2
    );
  }

  for(let b of buildings){

    const rx=(b.x-player.x)*scale;
    const ry=(b.y-player.y)*scale;

    mctx.fillStyle="lime";

    mctx.fillRect(
      cx+rx,
      cy+ry,
      3,
      3
    );
  }

  if(!landed){

    for(let p of planets){

      const rx=(p.x-player.x)*scale;
      const ry=(p.y-player.y)*scale;

      if(Math.hypot(rx,ry)<120){

        mctx.fillStyle="blue";

        mctx.beginPath();

        mctx.arc(
          cx+rx,
          cy+ry,
          4,
          0,
          Math.PI*2
        );

        mctx.fill();
      }
    }

    for(let b of blackholes){

      const rx=(b.x-player.x)*scale;
      const ry=(b.y-player.y)*scale;

      if(Math.hypot(rx,ry)<120){

        mctx.fillStyle="purple";

        mctx.beginPath();

        mctx.arc(
          cx+rx,
          cy+ry,
          4,
          0,
          Math.PI*2
        );

        mctx.fill();
      }
    }
  }

  mctx.fillStyle="white";

  mctx.beginPath();

  mctx.arc(
    cx,
    cy,
    3,
    0,
    Math.PI*2
  );

  mctx.fill();
}

/* =========================
FULLSCREEN
========================= */

function toggleFullscreen(){

  if(!document.fullscreenElement){

    document.documentElement
      .requestFullscreen?.();
  }
  else{

    document.exitFullscreen?.();
  }
}

function toggleBoost(){

  boost=!boost;
}

/* =========================
LOOP
========================= */

function loop(){

  requestAnimationFrame(loop);

  ctx.fillStyle=
    landed
    ?"#102010"
    :"#050510";

  ctx.fillRect(
    0,
    0,
    canvas.width,
    canvas.height
  );

  player.x+=move.x*(boost?6:3);
  player.y+=move.y*(boost?6:3);

  updateBlackholes();

  if(!landed){

    for(let i=0;i<120;i++){

      const sx=(i*997)%canvas.width;
      const sy=(i*541)%canvas.height;

      ctx.fillStyle="white";

      ctx.fillRect(
        sx,
        sy,
        1,
        1
      );
    }
  }

  /* SPACE */

  if(!landed){

    const asteroids=getAsteroids();

    for(let a of asteroids){

      a.x+=a.vx||0;
      a.y+=a.vy||0;

      const s=screen(a.x,a.y);

      ctx.fillStyle="#777";

      ctx.beginPath();

      ctx.arc(
        s.x,
        s.y,
        a.r,
        0,
        Math.PI*2
      );

      ctx.fill();

      ctx.fillStyle="red";

      ctx.fillRect(
        s.x-a.r,
        s.y-a.r-10,
        a.r*2,
        4
      );

      ctx.fillStyle="lime";

      ctx.fillRect(
        s.x-a.r,
        s.y-a.r-10,
        (a.r*2)*(a.hp/a.maxHp),
        4
      );
    }

    for(let p of planets){

      const s=screen(p.x,p.y);

      ctx.fillStyle=p.color;

      ctx.beginPath();

      ctx.arc(
        s.x,
        s.y,
        p.r,
        0,
        Math.PI*2
      );

      ctx.fill();

      ctx.fillStyle="white";

      ctx.font="20px Arial";

      ctx.fillText(
        p.name,
        s.x-30,
        s.y
      );
    }

    for(let b of blackholes){

      const s=screen(b.x,b.y);

      ctx.fillStyle="purple";

      ctx.beginPath();

      ctx.arc(
        s.x,
        s.y,
        b.r,
        0,
        Math.PI*2
      );

      ctx.fill();

      ctx.strokeStyle="magenta";

      ctx.beginPath();

      ctx.arc(
        s.x,
        s.y,
        b.r*1.5,
        0,
        Math.PI*2
      );

      ctx.stroke();
    }
  }

  /* SURFACE */

  else{

    for(let r of surfaceRocks){

      const sx=
        (r.x-player.x)+canvas.width/2;

      const sy=
        (r.y-player.y)+canvas.height/2;

      ctx.fillStyle="#777";

      ctx.beginPath();

      ctx.arc(
        sx,
        sy,
        r.r,
        0,
        Math.PI*2
      );

      ctx.fill();

      ctx.fillStyle="red";

      ctx.fillRect(
        sx-r.r,
        sy-r.r-10,
        r.r*2,
        4
      );

      ctx.fillStyle="lime";

      ctx.fillRect(
        sx-r.r,
        sy-r.r-10,
        (r.r*2)*(r.hp/r.maxHp),
        4
      );
    }
  }

  /* BUILDINGS */

  for(let b of buildings){

    const s=screen(b.x,b.y);

    ctx.fillStyle="lime";

    ctx.fillRect(
      s.x-6,
      s.y-6,
      12,
      12
    );

    resources+=0.005;
  }

  /* DRONES */

  updateDrones();

  for(let d of drones){

    const s=screen(d.x,d.y);

    ctx.fillStyle="orange";

    ctx.beginPath();

    ctx.arc(
      s.x,
      s.y,
      6,
      0,
      Math.PI*2
    );

    ctx.fill();
  }

  /* LASER */

  drawLaser();

  /* SHIP ANGLE */

  if(Math.abs(move.x)>0.05 ||
     Math.abs(move.y)>0.05){

    playerAngle=Math.atan2(
      move.y,
      move.x
    );
  }

  if(Math.abs(aim.x)>0.05 ||
     Math.abs(aim.y)>0.05){

    playerAngle=Math.atan2(
      aim.y,
      aim.x
    );
  }

  /* PLAYER */

  if(!landed){

    ctx.save();

    ctx.translate(
      canvas.width/2,
      canvas.height/2
    );

    ctx.rotate(playerAngle+Math.PI/2);

    if(shipImg.complete){

      ctx.drawImage(
        shipImg,
        -32,
        -32,
        64,
        64
      );
    }
    else{

      ctx.fillStyle="cyan";

      ctx.beginPath();

      ctx.moveTo(0,-14);
      ctx.lineTo(10,12);
      ctx.lineTo(-10,12);
      ctx.closePath();

      ctx.fill();
    }

    /* BOOST FLAME */

    if(boost){

      ctx.fillStyle="orange";

      ctx.beginPath();

      ctx.moveTo(-5,24);

      ctx.lineTo(
        0,
        42+Math.random()*10
      );

      ctx.lineTo(5,24);

      ctx.fill();
    }

    ctx.restore();
  }
  else{

    ctx.fillStyle="cyan";

    ctx.beginPath();

    ctx.arc(
      canvas.width/2,
      canvas.height/2,
      10,
      0,
      Math.PI*2
    );

    ctx.fill();
  }

  drawRadar();

  document.getElementById("res")
    .innerText=Math.floor(resources);
}

loop();

</script>
